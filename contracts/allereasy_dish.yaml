contract:
  name: allereasy_dish
  version: "1.0"
  description: >
    Natasha's Law (Food Information (Amendment) (England) Regulations 2019)
    allergen audit trail contract for AllerEasy PPDS dish records.
    Enforces that every dish marked 'active' has an explicit allergen review
    record — who reviewed it and when. This closes the structural gap where
    allergens can remain unreviewed (M2M blank=True) before a dish goes live.
    Applies to any food business making food on the same premises it is sold
    (PPDS scope). See docs/opendqv-integration.md for integration guide.
  owner: "AllerEasy"
  status: active
  asset_id: urn:opendqv:allereasy_dish

  rules:

    # ── DISH IDENTITY ─────────────────────────────────────────────────────────
    - name: dish_name_required
      field: dish_name
      type: not_empty
      severity: error
      error_message: "dish_name is required"

    # ── ALLERGEN REVIEW AUDIT TRAIL ──────────────────────────────────────────
    # Natasha's Law requires that allergen information is actively reviewed
    # before a PPDS item is served. These three fields create a timestamped
    # audit trail: who confirmed the review, and when.

    - name: allergen_review_confirmed_required
      field: allergen_review_confirmed
      type: not_empty
      severity: error
      error_message: "allergen_review_confirmed must be set — Natasha's Law requires explicit allergen review before a dish is made active"

    - name: allergen_review_confirmed_true
      field: allergen_review_confirmed
      type: allowed_values
      allowed_values:
        - "true"
      severity: error
      error_message: "allergen_review_confirmed must be 'true' — tick the confirmation box to record that allergen status has been reviewed (Natasha's Law PPDS compliance)"

    - name: allergen_reviewed_by_required
      field: allergen_reviewed_by
      type: not_empty
      severity: error
      error_message: "allergen_reviewed_by is required — record who verified the allergen information before this dish was served (Natasha's Law PPDS audit trail)"

    - name: allergen_review_date_required
      field: allergen_review_date
      type: not_empty
      severity: error
      error_message: "allergen_review_date is required — record the date allergen compliance was reviewed"

    - name: allergen_review_date_format
      field: allergen_review_date
      type: date_format
      format: "%Y-%m-%d"
      severity: error
      error_message: "allergen_review_date must be a valid ISO 8601 date (YYYY-MM-DD) — required for FSA audit trail"
