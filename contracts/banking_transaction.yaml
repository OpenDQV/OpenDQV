contract:
  name: banking_transaction
  version: "1.1"
  description: "Banking transaction record validation"
  owner: "Payments Data Team"
  status: active
  asset_id: urn:opendqv:banking_transaction

  rules:
    - name: transaction_id_required
      field: transaction_id
      type: not_empty
      severity: error
      error_message: "transaction_id is required"

    - name: account_number_required
      field: account_number
      type: not_empty
      severity: error
      error_message: "account_number is required"

    - name: account_number_min_length
      field: account_number
      type: min_length
      min: 6
      severity: error
      error_message: "account_number must be at least 6 characters"

    - name: sort_code_format
      field: sort_code
      type: regex
      pattern: '^\d{2}-\d{2}-\d{2}$'
      severity: warning
      error_message: "sort_code must be in NN-NN-NN format (e.g. 20-00-00) — required for Faster Payments (PSR) and BACS submissions"

    - name: bic_format
      field: bic
      type: regex
      pattern: '^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$'
      severity: warning
      error_message: "bic must be a valid ISO 9362 BIC/SWIFT code (e.g. BARCGB22) — required for SEPA credit transfers and SWIFT cross-border payments"

    - name: transaction_date_format
      field: transaction_date
      type: date_format
      severity: error
      error_message: "transaction_date must be a valid date (YYYY-MM-DD)"

    - name: amount_min
      field: amount
      type: min
      min: 0.01
      severity: error
      error_message: "amount must be > 0"

    - name: amount_large_transaction_warning
      field: amount
      type: max
      max: 85000
      severity: warning
      error_message: "amount exceeds £85,000 FSCS deposit protection limit — enhanced due diligence may be required under Money Laundering Regulations 2017 (MLR17)"

    - name: currency_format
      field: currency
      type: regex
      pattern: '^[A-Z]{3}$'
      severity: error
      error_message: "currency must be a 3-letter ISO 4217 code (e.g. GBP, USD, EUR)"

    - name: transaction_type_valid
      field: transaction_type
      type: allowed_values
      allowed_values: [debit, credit, transfer, payment, refund, fee, chargeback, reversal]
      severity: error
      error_message: "transaction_type must be one of: debit, credit, transfer, payment, refund, fee, chargeback, reversal — chargeback/reversal trigger Consumer Duty and Payment Services Regulations 2017 obligations"

    - name: channel_valid
      field: channel
      type: allowed_values
      allowed_values: [online, mobile, branch, atm, pos, api, open_banking]
      severity: error
      error_message: "channel must be one of: online, mobile, branch, atm, pos, api, open_banking — open_banking is PSD2 Article 66/67 regulated (AISP/PISP access)"

    - name: reference_max_length
      field: reference
      type: max_length
      max_length: 18
      severity: error
      error_message: "reference must not exceed 18 characters — Faster Payments Service limit; longer references are silently truncated by receiving banks causing reconciliation failures"

    - name: merchant_id_required
      field: merchant_id
      type: not_empty
      severity: warning
      error_message: "merchant_id should be provided for card transactions"
