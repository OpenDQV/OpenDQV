contract:
  name: books
  version: "1.0"
  description: >
    Book catalogue data quality validation. Enforces mandatory bibliographic
    fields including ISBN-13 format, valid publication date, and page count.
    Prevents incomplete records entering a catalogue or inventory system before
    they are saved — the omission failure mode: a book record without a valid
    ISBN or publication date cannot be reliably identified or distributed.
  owner: "Data Team"
  status: active

  rules:

    # ── BIBLIOGRAPHIC IDENTITY ─────────────────────────────────────────────────
    - name: title_required
      field: title
      type: not_empty
      severity: error
      error_message: "title is required"

    - name: author_required
      field: author
      type: not_empty
      severity: error
      error_message: "author is required"

    - name: isbn_required
      field: isbn
      type: not_empty
      severity: error
      error_message: "isbn is required — every book record must have an ISBN"

    - name: isbn_format
      field: isbn
      type: regex
      pattern: "^(978|979)[0-9]{10}$"
      severity: error
      error_message: "isbn must be a valid ISBN-13 (13 digits beginning with 978 or 979, no hyphens)"

    - name: publisher_required
      field: publisher
      type: not_empty
      severity: error
      error_message: "publisher is required"

    # ── PUBLICATION DETAILS ────────────────────────────────────────────────────
    - name: publication_date_required
      field: publication_date
      type: not_empty
      severity: error
      error_message: "publication_date is required"

    - name: publication_date_format
      field: publication_date
      type: date_format
      severity: error
      error_message: "publication_date must be a valid date (YYYY-MM-DD)"

    - name: genre_required
      field: genre
      type: not_empty
      severity: error
      error_message: "genre is required"

    - name: genre_valid
      field: genre
      type: lookup
      lookup_file: ref/books_genres.txt
      severity: error
      error_message: "genre must be one of: fiction, non_fiction, science_fiction, fantasy, mystery, thriller, romance, biography, history, science, technology, children, young_adult, poetry, graphic_novel, reference, other"

    - name: language_required
      field: language
      type: not_empty
      severity: error
      error_message: "language is required"

    - name: edition_minimum
      field: edition
      type: min
      min: 1
      severity: error
      error_message: "edition must be >= 1"

    - name: page_count_minimum
      field: page_count
      type: min
      min: 1
      severity: error
      error_message: "page_count must be >= 1"
