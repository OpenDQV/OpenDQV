contract:
  name: martyns_law_venue
  version: "1.0"
  description: >
    Martyn's Law (Terrorism (Protection of Premises) Act 2025) compliance contract
    for venue and event operators. Enforces documented emergency procedures, staff
    training, and — for enhanced-duty venues (800+ capacity) — a named Senior
    Responsible Person, a Terrorism Protection Plan, and SIA registration at the
    point of write, before the compliance record is saved. Named after Martyn Hett
    (1987–2017), killed in the Manchester Arena attack. The omission failure mode
    this contract prevents: "we didn't fill that field in."
  owner: "Public Safety Data Team"
  status: active

  rules:

    # ── VENUE IDENTITY ───────────────────────────────────────────────────────
    - name: venue_id_required
      field: venue_id
      type: not_empty
      severity: error
      error_message: "venue_id is required — every venue record must be uniquely identifiable"

    - name: venue_name_required
      field: venue_name
      type: not_empty
      severity: error
      error_message: "venue_name is required"

    - name: venue_address_required
      field: venue_address
      type: not_empty
      severity: error
      error_message: "venue_address is required"

    - name: capacity_required
      field: capacity
      type: not_empty
      severity: error
      error_message: "capacity is required — Martyn's Law applies to premises with a capacity of 200 or more"

    - name: capacity_minimum
      field: capacity
      type: min
      min: 200
      severity: error
      error_message: "capacity must be >= 200 — Martyn's Law applies only to venues with a qualifying capacity of 200 or more persons"

    - name: venue_type_required
      field: venue_type
      type: not_empty
      severity: error
      error_message: "venue_type is required"

    - name: venue_type_valid
      field: venue_type
      type: lookup
      lookup_file: ref/martyns_law_venue_types.txt
      severity: error
      error_message: "venue_type must be one of: arena, conference_centre, hotel, museum_gallery, nightclub, place_of_worship, pub_bar, restaurant, shopping_centre, sports_stadium, theatre, other"

    # ── DUTY TIER DECLARATION ─────────────────────────────────────────────────
    # The operator declares the tier; the contract enforces tier-conditional
    # completeness. Capacity cannot auto-derive tier — condition blocks support
    # exact string matches only, not numeric ranges. Standard: 200–799 persons.
    # Enhanced: 800+ persons.
    - name: duty_tier_required
      field: duty_tier
      type: not_empty
      severity: error
      error_message: "duty_tier is required — declare 'standard' (200–799 capacity) or 'enhanced' (800+ capacity)"

    - name: duty_tier_valid
      field: duty_tier
      type: lookup
      lookup_file: ref/martyns_law_duty_tiers.txt
      severity: error
      error_message: "duty_tier must be 'standard' or 'enhanced'"

    # ── STANDARD DUTY — ALL TIERS ─────────────────────────────────────────────
    # Every venue in scope (200+) must document evacuation, invacuation
    # (shelter-in-place), and lockdown procedures, and ensure all staff are
    # trained on them. These obligations apply regardless of duty tier.

    - name: evacuation_procedure_documented_required
      field: evacuation_procedure_documented
      type: not_empty
      severity: error
      error_message: "evacuation_procedure_documented must be declared (true or false) — Martyn's Law requires a documented evacuation procedure for all in-scope premises"

    - name: evacuation_procedure_documented_valid
      field: evacuation_procedure_documented
      type: lookup
      lookup_file: ref/allergen_boolean.txt
      severity: error
      error_message: "evacuation_procedure_documented must be 'true' or 'false'"

    - name: invacuation_procedure_documented_required
      field: invacuation_procedure_documented
      type: not_empty
      severity: error
      error_message: "invacuation_procedure_documented must be declared (true or false) — invacuation (shelter-in-place) procedures are a standard duty requirement"

    - name: invacuation_procedure_documented_valid
      field: invacuation_procedure_documented
      type: lookup
      lookup_file: ref/allergen_boolean.txt
      severity: error
      error_message: "invacuation_procedure_documented must be 'true' or 'false'"

    - name: lockdown_procedure_documented_required
      field: lockdown_procedure_documented
      type: not_empty
      severity: error
      error_message: "lockdown_procedure_documented must be declared (true or false) — lockdown procedures are a standard duty requirement under Martyn's Law"

    - name: lockdown_procedure_documented_valid
      field: lockdown_procedure_documented
      type: lookup
      lookup_file: ref/allergen_boolean.txt
      severity: error
      error_message: "lockdown_procedure_documented must be 'true' or 'false'"

    - name: staff_training_completed_required
      field: staff_training_completed
      type: not_empty
      severity: error
      error_message: "staff_training_completed must be declared (true or false) — all staff must be trained on emergency procedures under standard duty"

    - name: staff_training_completed_valid
      field: staff_training_completed
      type: lookup
      lookup_file: ref/allergen_boolean.txt
      severity: error
      error_message: "staff_training_completed must be 'true' or 'false'"

    # When training is confirmed complete, the date must be recorded.
    - name: staff_training_date_required_if_completed
      field: staff_training_date
      type: required_if
      required_if:
        field: staff_training_completed
        value: "true"
      severity: error
      error_message: "staff_training_date is required when staff_training_completed is true — record the date training was completed"

    - name: staff_training_date_format
      field: staff_training_date
      type: date_format
      condition:
        field: staff_training_completed
        value: "true"
      severity: error
      error_message: "staff_training_date must be a valid date (YYYY-MM-DD)"

    # ── ENHANCED DUTY — REQUIRED WHEN duty_tier = enhanced ───────────────────
    # Venues with a capacity of 800+ persons are subject to enhanced duty.
    # The following fields are mandatory for enhanced-duty venues and are
    # structurally enforced via required_if. A missing field triggers a 422
    # before the record enters the system — the same omission prevention
    # pattern as Natasha's Law allergen fields.

    # Senior Responsible Person: a named senior individual who takes
    # personal accountability for terrorism preparedness at the venue.
    - name: senior_responsible_person_required_if_enhanced
      field: senior_responsible_person
      type: required_if
      required_if:
        field: duty_tier
        value: "enhanced"
      severity: error
      error_message: "senior_responsible_person is required for enhanced-duty venues — Martyn's Law mandates a named Senior Responsible Person for premises with a capacity of 800+"

    - name: senior_responsible_person_role_required_if_enhanced
      field: senior_responsible_person_role
      type: required_if
      required_if:
        field: duty_tier
        value: "enhanced"
      severity: error
      error_message: "senior_responsible_person_role is required for enhanced-duty venues — record the organisational role of the Senior Responsible Person"

    # SIA registration: enhanced-duty venues must register with and notify
    # the Security Industry Authority (SIA).
    - name: sia_registration_number_required_if_enhanced
      field: sia_registration_number
      type: required_if
      required_if:
        field: duty_tier
        value: "enhanced"
      severity: error
      error_message: "sia_registration_number is required for enhanced-duty venues — premises must register with the Security Industry Authority (SIA) under Martyn's Law"

    # Terrorism Protection Plan: a formal documented plan, more comprehensive
    # than the standard evacuation/invacuation/lockdown procedures.
    - name: terrorism_protection_plan_documented_required_if_enhanced
      field: terrorism_protection_plan_documented
      type: required_if
      required_if:
        field: duty_tier
        value: "enhanced"
      severity: error
      error_message: "terrorism_protection_plan_documented is required for enhanced-duty venues — a formal Terrorism Protection Plan is mandated for premises with a capacity of 800+"

    - name: terrorism_protection_plan_documented_valid
      field: terrorism_protection_plan_documented
      type: lookup
      lookup_file: ref/allergen_boolean.txt
      condition:
        field: duty_tier
        value: "enhanced"
      severity: error
      error_message: "terrorism_protection_plan_documented must be 'true' or 'false'"

    # When the TTP is confirmed documented, a review date must be recorded.
    - name: terrorism_protection_plan_review_date_required_if_ttp_documented
      field: terrorism_protection_plan_review_date
      type: required_if
      required_if:
        field: terrorism_protection_plan_documented
        value: "true"
      severity: error
      error_message: "terrorism_protection_plan_review_date is required when terrorism_protection_plan_documented is true — record the date the plan was last reviewed"

    - name: terrorism_protection_plan_review_date_format
      field: terrorism_protection_plan_review_date
      type: date_format
      condition:
        field: terrorism_protection_plan_documented
        value: "true"
      severity: error
      error_message: "terrorism_protection_plan_review_date must be a valid date (YYYY-MM-DD)"

    # ── COMPLIANCE AUDIT TRAIL ────────────────────────────────────────────────
    # Records who reviewed the compliance record and when. Required for
    # demonstrating due diligence in the event of an SIA inspection or incident.
    - name: compliance_reviewed_by_required
      field: compliance_reviewed_by
      type: not_empty
      severity: error
      error_message: "compliance_reviewed_by is required — record who verified the compliance declarations before the record was saved"

    - name: compliance_review_date_required
      field: compliance_review_date
      type: not_empty
      severity: error
      error_message: "compliance_review_date is required — record the date of the compliance review"

    - name: compliance_review_date_format
      field: compliance_review_date
      type: date_format
      severity: error
      error_message: "compliance_review_date must be a valid date (YYYY-MM-DD)"
