contract:
  name: building_safety_golden_thread
  # v2.3.20 P1.4: template-level attestation. The OpenDQV core
  # team proposed and reviewed this template; customers forking
  # this contract overwrite these fields with their own
  # organizational attestation when they go through their
  # regulated approve workflow.
  proposed_by: opendqv-core-team
  proposed_at: "2026-04-27T00:00:00+00:00"
  approved_by: opendqv-core-team
  approved_at: "2026-04-27T00:00:00+00:00"
  version: "1.0"
  description: >
    Building Safety Act 2022 — Golden Thread compliance contract for higher-risk
    buildings (18 metres or more in height, or 7 or more storeys above ground).
    Enforces accurate, up-to-date building information at the point of write:
    accountable person appointment, Building Safety Regulator (BSR) registration,
    safety case documentation, and golden thread audit trail. The law's own phrase
    is "accurate and up-to-date information throughout the building lifecycle" —
    this contract makes inaccurate or incomplete records structurally impossible
    before they enter a building management system.
  owner: "Building Safety Data Team"
  owner_email: opendqv@bgmsconsultants.com
  status: active
  asset_id: urn:opendqv:building_safety_golden_thread

  rules:

    # ── BUILDING IDENTITY ────────────────────────────────────────────────────
    - name: building_id_required
      field: building_id
      type: not_empty
      severity: error
      error_message: "building_id is required — every golden thread record must be uniquely identifiable"

    - name: building_name_required
      field: building_name
      type: not_empty
      severity: error
      error_message: "building_name is required"

    - name: building_address_required
      field: building_address
      type: not_empty
      severity: error
      error_message: "building_address is required — the golden thread record must include the full address of the higher-risk building"

    # Height and storeys are both required in the golden thread — either criterion
    # alone qualifies a building as higher-risk (18m+ OR 7+ storeys). Both must
    # be recorded for the golden thread to be complete.
    - name: height_metres_required
      field: height_metres
      type: not_empty
      severity: error
      error_message: "height_metres is required — the golden thread must record the building height; higher-risk threshold is 18 metres"

    - name: storeys_above_ground_required
      field: storeys_above_ground
      type: not_empty
      severity: error
      error_message: "storeys_above_ground is required — the golden thread must record the number of storeys; higher-risk threshold is 7 storeys"

    - name: primary_use_required
      field: primary_use
      type: not_empty
      severity: error
      error_message: "primary_use is required"

    - name: primary_use_valid
      field: primary_use
      type: lookup
      lookup_file: ref/building_safety_primary_uses.txt
      severity: error
      error_message: "primary_use must be one of: residential, mixed_use, hotel, care_home, student_accommodation, hospital, other"

    # ── ACCOUNTABLE PERSONS ───────────────────────────────────────────────────
    # The Building Safety Act requires an Accountable Person (AP) — the entity
    # with legal control of or responsibility for the common parts of the building.
    # Where there are multiple APs, one must be designated Principal Accountable
    # Person (PAP). The Building Safety Manager (BSM) handles day-to-day safety.

    - name: accountable_person_name_required
      field: accountable_person_name
      type: not_empty
      severity: error
      error_message: "accountable_person_name is required — the Building Safety Act mandates a named Accountable Person for every higher-risk building"

    - name: accountable_person_organisation_required
      field: accountable_person_organisation
      type: not_empty
      severity: error
      error_message: "accountable_person_organisation is required — record the organisation of the Accountable Person"

    - name: accountable_person_contact_required
      field: accountable_person_contact
      type: not_empty
      severity: error
      error_message: "accountable_person_contact is required — a contact address or email for the Accountable Person must be recorded in the golden thread"

    - name: building_safety_manager_name_required
      field: building_safety_manager_name
      type: not_empty
      severity: error
      error_message: "building_safety_manager_name is required — the Building Safety Act requires a named Building Safety Manager responsible for day-to-day safety"

    - name: building_safety_manager_contact_required
      field: building_safety_manager_contact
      type: not_empty
      severity: error
      error_message: "building_safety_manager_contact is required — a contact address or email for the Building Safety Manager must be recorded"

    # ── BSR REGISTRATION ──────────────────────────────────────────────────────
    # All higher-risk buildings must be registered with the Building Safety
    # Regulator (BSR) before occupation. Existing buildings were required to
    # register by 1 October 2023.

    - name: bsr_registration_number_required
      field: bsr_registration_number
      type: not_empty
      severity: error
      error_message: "bsr_registration_number is required — all higher-risk buildings must be registered with the Building Safety Regulator (BSR)"

    - name: bsr_registration_date_required
      field: bsr_registration_date
      type: not_empty
      severity: error
      error_message: "bsr_registration_date is required — record the date of BSR registration"

    - name: bsr_registration_date_format
      field: bsr_registration_date
      type: date_format
      severity: error
      error_message: "bsr_registration_date must be a valid date (YYYY-MM-DD)"

    # ── SAFETY CASE ───────────────────────────────────────────────────────────
    # The Accountable Person must prepare and maintain a Safety Case — a
    # structured argument supported by evidence that the building is safe to
    # occupy. A Safety Case Report must be submitted to the BSR for approval
    # before the building can be occupied.

    - name: safety_case_documented_required
      field: safety_case_documented
      type: not_empty
      severity: error
      error_message: "safety_case_documented must be declared (true or false) — the Building Safety Act requires a Safety Case for every higher-risk building"

    - name: safety_case_documented_valid
      field: safety_case_documented
      type: lookup
      lookup_file: ref/allergen_boolean.txt
      severity: error
      error_message: "safety_case_documented must be 'true' or 'false'"

    - name: safety_case_report_date_required_if_documented
      field: safety_case_report_date
      type: required_if
      required_if:
        field: safety_case_documented
        value: "true"
      severity: error
      error_message: "safety_case_report_date is required when safety_case_documented is true — record the date the Safety Case Report was prepared or last reviewed"

    - name: safety_case_report_date_format
      field: safety_case_report_date
      type: date_format
      condition:
        field: safety_case_documented
        value: "true"
      severity: error
      error_message: "safety_case_report_date must be a valid date (YYYY-MM-DD)"

    # ── GOLDEN THREAD SUPPORTING DOCUMENTS ───────────────────────────────────
    - name: fire_and_emergency_file_maintained_required
      field: fire_and_emergency_file_maintained
      type: not_empty
      severity: error
      error_message: "fire_and_emergency_file_maintained must be declared (true or false) — a fire and emergency file is a required golden thread document"

    - name: fire_and_emergency_file_maintained_valid
      field: fire_and_emergency_file_maintained
      type: lookup
      lookup_file: ref/allergen_boolean.txt
      severity: error
      error_message: "fire_and_emergency_file_maintained must be 'true' or 'false'"

    - name: residents_engagement_strategy_required
      field: residents_engagement_strategy_documented
      type: not_empty
      severity: error
      error_message: "residents_engagement_strategy_documented must be declared (true or false) — the Accountable Person must have a residents engagement strategy"

    - name: residents_engagement_strategy_valid
      field: residents_engagement_strategy_documented
      type: lookup
      lookup_file: ref/allergen_boolean.txt
      severity: error
      error_message: "residents_engagement_strategy_documented must be 'true' or 'false'"

    # ── GOLDEN THREAD AUDIT TRAIL ─────────────────────────────────────────────
    # The golden thread must be accurate and up-to-date throughout the building
    # lifecycle. These fields record who maintains it and when it was last updated.
    - name: golden_thread_maintained_by_required
      field: golden_thread_maintained_by
      type: not_empty
      severity: error
      error_message: "golden_thread_maintained_by is required — record who is responsible for maintaining the golden thread record"

    - name: golden_thread_last_updated_required
      field: golden_thread_last_updated
      type: not_empty
      severity: error
      error_message: "golden_thread_last_updated is required — the golden thread must record when it was last updated"

    - name: golden_thread_last_updated_format
      field: golden_thread_last_updated
      type: date_format
      severity: error
      error_message: "golden_thread_last_updated must be a valid date (YYYY-MM-DD)"
