name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install poetry && poetry install --with dev

      - name: Install missing test dependencies
        run: poetry run pip install regex pyarrow questionary pytest-timeout

      - name: Run tests
        run: poetry run python -m pytest tests/ --ignore=tests/test_e2e.py -p no:playwright --tb=short --timeout=60 -q --cov=. --cov-report=xml --cov-omit="tests/*,ui/*,scripts/*,examples/*"
        env:
          OPENDQV_NODE_ID: 'ci-test-node'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt cyclonedx-bom
      - name: Generate SBOM
        run: cyclonedx-py environment --output-format JSON > sbom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: sbom
          path: sbom.json

  security-scan:
    name: Static security analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Run bandit (static analysis)
        # B310: urllib urlopen — URLs are always http(s) from config, never file:// or custom schemes
        # B108: hardcoded /tmp — intentional session state file for the onboarding wizard
        # B608: SQL injection — DuckDB batch queries; field names/values sourced from validated YAML contracts, never user input
        run: bandit -r core/ api/ -ll -x tests/ --skip B310,B108,B608
      - name: Run pip-audit (dependency CVE check)
        # CVE-2024-23342: timing attack in the `ecdsa` package (transitive dep of python-jose).
        # No upstream fix exists. At runtime python-jose[cryptography] routes all ECDSA ops
        # through the `cryptography` package, so ecdsa is installed but never called.
        run: pip install -r requirements.txt && pip-audit --requirement requirements.txt --ignore-vuln CVE-2024-23342

  integration:
    name: Integration tests (live stack)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Copy env file
        run: cp .env.example .env

      - name: Start stack
        run: docker compose up -d --wait
        timeout-minutes: 3

      - name: Install dev dependencies
        run: pip install poetry && poetry install --with dev

      - name: Run integration tests (require live API)
        run: poetry run python -m pytest tests/test_llm_remediation_loop.py::TestLoopIntegration -v --tb=short
        env:
          OPENDQV_NODE_ID: 'ci-integration-node'

      - name: Stop stack
        if: always()
        run: docker compose down -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - run: pip install ruff
      - run: ruff check . --select E,W,F --ignore E501,E402,E701
