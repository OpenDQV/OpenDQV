name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install poetry && poetry install --with dev

      - name: Install missing test dependencies
        run: poetry run pip install regex pyarrow questionary pytest-timeout

      - name: Assert ENGINE_VERSION matches pyproject.toml
        run: |
          poetry run python -c "
          import tomllib, importlib.metadata
          pkg = tomllib.load(open('pyproject.toml', 'rb'))['tool']['poetry']['version']
          eng = importlib.metadata.version('opendqv')
          assert pkg == eng, f'VERSION MISMATCH: pyproject={pkg} installed={eng}'
          print(f'ENGINE_VERSION OK: {eng}')
          "

      - name: Run tests
        run: poetry run python -m pytest tests/ --ignore=tests/test_e2e.py -p no:playwright --tb=short --timeout=60 -q --cov=opendqv/core --cov=opendqv/api --cov=opendqv/security --cov=opendqv/sdk --cov-branch --cov-report=xml
        env:
          OPENDQV_NODE_ID: 'ci-test-node'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: OpenDQV/OpenDQV
          files: ./coverage.xml
          fail_ci_if_error: false

  requirements-check:
    name: Validate requirements.txt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install poetry + export plugin
        run: pip install poetry poetry-plugin-export

      - name: Verify requirements.txt is up-to-date with poetry lockfile
        run: |
          poetry export -f requirements.txt --without-hashes --without dev --extras server -o requirements_ci.txt
          diff requirements.txt requirements_ci.txt || (echo "requirements.txt is out of sync with poetry.lock — run: poetry export -f requirements.txt --without-hashes --without dev --extras server -o requirements.txt" && exit 1)

      - name: Install from requirements.txt
        run: pip install -r requirements.txt

      - name: Verify core imports work
        run: |
          python -c "
          import fastapi, uvicorn, pydantic, yaml, pandas, duckdb
          import jwt, passlib, httpx, requests, strawberry
          print('requirements.txt: all core imports OK')
          "

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt cyclonedx-bom
      - name: Generate SBOM
        run: cyclonedx-py environment --output-format JSON > sbom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: sbom
          path: sbom.json

  security-scan:
    name: Static security analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Run bandit (static analysis)
        # B310: urllib urlopen — URLs are always http(s) from config, never file:// or custom schemes
        # B108: hardcoded /tmp — intentional session state file for the onboarding wizard
        # B608: SQL injection — DuckDB batch queries; field names/values sourced from validated YAML contracts, never user input
        run: bandit -r core/ api/ -ll -x tests/ --skip B310,B108,B608
      - name: Run pip-audit (dependency CVE check)
        # CVE-2026-4539: pygments 2.19.2 (transitive dep of streamlit/rich).
        # 2.19.2 is the latest release; no upstream fix available yet.
        # NOTE: CVE-2024-23342 (ecdsa timing attack) ignore was removed 2026-04-03 —
        # python-jose and ecdsa are no longer in the dependency tree.
        run: pip install -r requirements.txt && pip-audit --requirement requirements.txt --ignore-vuln CVE-2026-4539

  container-scan:
    name: Container image scan (Grype + Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      # Single-arch build loaded into the local Docker daemon for scanning.
      # Multi-arch builds (linux/amd64,linux/arm64) cannot be loaded locally —
      # a separate amd64-only build is required here.
      - name: Build image for scanning (linux/amd64)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: opendqv:ci
          cache-from: type=gha

      # --- Grype (primary scanner — Anchore) ---
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan with Grype
        run: grype opendqv:ci --fail-on high --only-fixed

      # --- Trivy binary v0.69.3 ---
      # NOTE: Do NOT use aquasecurity/trivy-action or aquasecurity/setup-trivy.
      # Both GitHub Actions repos had version tags force-pushed with malicious commits
      # on 2026-03-19 (TeamPCP supply chain attack). The Trivy binary downloaded
      # directly at a pinned version is safe. v0.69.3 is the last known clean release.
      # Review this pin when Aqua Security publishes a confirmed post-remediation release.
      - name: Install Trivy binary (v0.69.3)
        run: |
          curl -sSfL \
            https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.tar.gz \
            | tar -xz -C /usr/local/bin trivy

      - name: Scan with Trivy
        run: |
          trivy image opendqv:ci \
            --ignore-unfixed \
            --exit-code 1 \
            --severity CRITICAL,HIGH

  integration:
    name: Integration tests (live stack)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Copy env file
        run: cp .env.example .env

      - name: Start stack
        # Build from branch code (not the published image) so CI tests the PR's changes.
        run: docker compose up api -d --build --wait
        timeout-minutes: 3

      - name: Install dev dependencies
        run: pip install poetry && poetry install --with dev

      - name: Run integration tests (require live API)
        run: poetry run python -m pytest tests/test_llm_remediation_loop.py::TestLoopIntegration -v --tb=short
        env:
          OPENDQV_NODE_ID: 'ci-integration-node'

      - name: Stop stack
        if: always()
        run: docker compose down -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - run: pip install ruff
      - run: ruff check . --select E,W,F --ignore E501,E402,E701

  link-check:
    name: Link check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --timeout 30
            --retry-wait-time 5
            --max-retries 3
            --exclude "localhost"
            --exclude "127\.0\.0\.1"
            --exclude "0\.0\.0\.0"
            --exclude "opendqv:8000"
            --exclude "api\.yourcompany\.com"
            --exclude "grafana\.internal"
            --exclude "^https://github\.com/OpenDQV/OpenDQV/actions"
            --exclude "^https://codecov\.io"
            --exclude "file://"
            --exclude "fda\.gov"
            --exclude "sia\.homeoffice\.gov\.uk"
            --exclude "securityscorecards\.dev/#/"
            --exclude "claude\.ai"
            --exclude "ico\.org\.uk"
            --exclude "github\.com/user-attachments"
            --exclude "allereasy\.co\.uk"
            --exclude "linkedin\.com"
            '**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
