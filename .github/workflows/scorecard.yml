name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly on Saturday at 01:30 UTC
    - cron: '30 1 * * 6'
  push:
    branches: [main]

# Least-privilege: only read by default; individual jobs opt in to more
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # Scorecard requires a public repo — skips silently on private, activates on go-live
    if: github.event.repository.visibility == 'public'
    permissions:
      security-events: write   # upload SARIF to GitHub code scanning
      id-token: write          # publish results to OpenSSF REST API
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results feeds the badge at securityscorecards.dev
          # Requires the repo to be public — activates automatically on go-live
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to GitHub code-scanning dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
