name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly on Saturday at 01:30 UTC
    - cron: '30 1 * * 6'
  push:
    branches: [main]

# Least-privilege: only read by default; individual jobs opt in to more
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # Scorecard requires a public repo — skips silently on private, activates on go-live
    if: github.event.repository.visibility == 'public'
    permissions:
      security-events: write   # upload SARIF to GitHub code scanning
      id-token: write          # publish results to OpenSSF REST API
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46  # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results feeds the badge at securityscorecards.dev
          # Requires the repo to be public — activates automatically on go-live
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to GitHub code-scanning dashboard
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13  # v3
        with:
          sarif_file: results.sarif
